name: Seal Security Remediation (Go)

on:
  workflow_dispatch:
    inputs:
      fix_mode:
        description: 'Fix mode: remote (UI-approved), local (actions file), or all (everything available)'
        required: true
        default: 'remote'
        type: choice
        options:
          - remote
          - local
          - all

jobs:
  remediate-and-run:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 'stable'

      - name: Install Dependencies
        run: go mod download

      - name: Seal Security - Fix Vulnerabilities
        uses: seal-community/cli-action@latest
        with:
          mode: fix
          fix_mode: ${{ github.event.inputs.fix_mode || 'remote' }}
          target: go.mod
          token: ${{ secrets.SEAL_TOKEN }}

      - name: Build Application
        run: go build ./...

      - name: Start Application
        run: |
          wget -q https://bin.equinox.io/c/bNyj1mQVY4c/ngrok-v3-stable-linux-amd64.tgz
          tar xzf ngrok-v3-stable-linux-amd64.tgz
          ./ngrok config add-authtoken ${{ secrets.NGROK_TOKEN }}
          ./ngrok http --url=sealtest.ngrok.dev 3001 &
          sleep 3
          echo "App:     https://sealtest.ngrok.dev"
          go run .
